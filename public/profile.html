<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Parking | Profile Operator</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/Defdava/Digital-Twin-Website-used/blob/575171d0e9964327d99950733c2b48cea0c59d72/logo-brin.png?raw=true">

    <style>
        :root {
            --primary-blue: #1D3354;
            --accent-red: #D64045;
            --accent-red-hover: #b8323a;
            --text-light: #FFFFFF;
            --toolbar-bg: rgba(29, 51, 84, 0.95);
            --card-bg: rgba(29, 51, 84, 0.9);
            --input-bg: rgba(255,255,255,0.12);
            --success-bg: rgba(46, 204, 113, 0.92);
            --error-bg: rgba(214,64,69,0.92);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #d3d3d3;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -2;
            animation: slideshow 20s infinite;
            opacity: 0.4;
        }

        @keyframes slideshow {
            0%   { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.4; }
            15%  { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.4; }
            20%  { opacity: 0; }
            20.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0; }
            35%  { opacity: 0.4; }
            40%  { opacity: 0; }
            40.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0; }
            55%  { opacity: 0.4; }
            60%  { opacity: 0; }
            60.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0; }
            75%  { opacity: 0.4; }
            80%  { opacity: 0; }
            80.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0; }
            95%  { opacity: 0.4; }
            100% { opacity: 0; }
        }

        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 15px;
        }

        .logo img { height: 50px; width: auto; }

        .logo span:first-child { font-size: 22px; font-weight: bold; }
        .logo span:last-child { font-size: 14px; opacity: 0.9; }

        .header-right {
            display: flex;
            align-items: center;
            padding-right: 30px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 
                0 0 10px rgba(214, 64, 69, 0.8),
                0 0 20px rgba(214, 64, 69, 0.6),
                0 0 30px rgba(214, 64, 69, 0.4);
            letter-spacing: 1.5px;
            white-space: nowrap;
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            0%   { text-shadow: 0 0 10px rgba(214,64,69,0.8), 0 0 20px rgba(214,64,69,0.6); }
            100% { text-shadow: 0 0 15px rgba(214,64,69,1), 0 0 30px rgba(214,64,69,0.8), 0 0 45px rgba(214,64,69,0.5); }
        }

        .toolbar {
            position: fixed;
            top: 80px;
            left: -300px;
            width: 260px;
            height: calc(100vh - 80px);
            background: var(--toolbar-bg);
            backdrop-filter: blur(4px);
            padding: 20px;
            z-index: 999;
            overflow-y: auto;
            transition: left 0.35s ease-in-out;
            box-shadow: 3px 0 12px rgba(0,0,0,0.35);
            border-right: 2px solid var(--accent-red);
            color: white;
        }

        .toolbar.active { left: 0; }

        .feature-box {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.18);
        }

        .feature-box h3 {
            margin: 0 0 14px;
            font-size: 1.15rem;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .user-info { text-align: center; }

        .user-info img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--accent-red);
            margin-bottom: 12px;
            object-fit: cover;
        }

        .user-info span { display: block; margin: 6px 0; font-size: 0.98rem; }

        .toolbar button {
            width: 100%;
            padding: 11px;
            margin: 7px 0;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s;
        }

        .toolbar button:hover {
            background: var(--accent-red-hover);
            transform: translateY(-1px);
        }

        .main-content {
            padding: 100px 25px 40px;
            min-height: 100vh;
            transition: margin-left 0.35s ease-in-out;
        }

        .main-content.with-toolbar { margin-left: 260px; }

        .profile-container {
            background: var(--card-bg);
            backdrop-filter: blur(6px);
            padding: 2.2rem;
            border-radius: 14px;
            max-width: 460px;
            margin: 0 auto;
            border: 2px solid var(--accent-red);
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
            text-align: center;
            color: white;
        }

        .profile-container h2 { margin: 0 0 1.8rem; font-size: 1.8rem; font-weight: bold; }

        .profile-picture-section {
            position: relative;
            display: inline-block;
            margin-bottom: 1.8rem;
        }

        .profile-container img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--accent-red);
            object-fit: cover;
            transition: transform 0.25s;
        }

        .profile-container img:hover { transform: scale(1.06); }

        .change-photo-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent-red);
            color: white;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .change-photo-btn:hover { background: var(--accent-red-hover); }

        .form-group {
            margin-bottom: 1.4rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 0.98rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid var(--accent-red);
            border-radius: 8px;
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input::placeholder { color: rgba(255,255,255,0.55); }

        input:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(215,64,69,0.28);
        }

        .password-section {
            margin: 1.8rem 0;
            padding: 1.2rem;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
        }

        .password-section h3 { margin: 0 0 1.2rem; font-size: 1.15rem; }

        #saveProfile {
            width: 100%;
            padding: 14px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 1.2rem;
        }

        #saveProfile:hover {
            background: var(--accent-red-hover);
            transform: translateY(-2px);
        }

        .loading-spinner {
            display: none;
            width: 28px;
            height: 28px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1.2rem auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #message {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 90%;
            padding: 14px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s;
        }

        #message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            header { padding: 12px 20px; }
            .logo img { height: 42px; }
            .header-title { font-size: 20px; }
            .toolbar { width: 82%; left: -82%; top: 70px; }
            .main-content.with-toolbar { margin-left: 0; }
            .profile-container { padding: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" id="toggleToolbar">
        <img src="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/46a20c237c763bc2ccd436c332785427771eea05/public/brin_logo.png?raw=true" alt="BRIN Logo">
        <div>
            <span>BRIN</span>
            <span>Badan Riset dan Inovasi Nasional</span>
        </div>
    </div>
    <div class="header-right">
        <div class="header-title">Parking Management System – Profile</div>
    </div>
</header>

<aside class="toolbar" id="toolbar">
    <div class="feature-box user-info">
        <h3>User Info</h3>
        <img id="sidebarProfilePic" src="/assets/user.JPG" alt="Profile">
        <span>Selamat Datang</span>
        <span id="sidebarUserName"></span>
        <button onclick="window.location.href='/profile.html'">Profile</button>
        <button id="logoutBtn">Keluar</button>
    </div>
    <div class="feature-box">
        <h3>Parking Management System</h3>
        <button onclick="window.location.href='/index.html'">Live Overview</button>
        <button onclick="window.location.href='/previous-analysis.html'">Previous Analysis</button>
        <button onclick="window.location.href='/exportdata.html'">Export Data</button>
        <button onclick="window.location.href='/helpdesk.html'">Helpdesk</button>
        <button onclick="window.location.href='/parkiranalysis.html'">Parking Analysis</button>
    </div>
</aside>

<div class="main-content" id="mainContent">
    <div id="message"></div>

    <div class="profile-container">
        <h2>Pengaturan Profil</h2>

        <div class="profile-picture-section">
            <img id="previewPic" src="/assets/user.JPG" alt="Foto Profil">
            <button class="change-photo-btn" id="changePhotoBtn">📷</button>
            <input type="file" id="profilePicture" accept="image/*" style="display:none;">
        </div>

        <div class="loading-spinner" id="loadingSpinner"></div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Nama pengguna">
        </div>

        <div class="form-group">
            <label for="idPegawai">ID Pegawai</label>
            <input type="text" id="idPegawai" placeholder="ID pegawai">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Alamat email">
        </div>

        <div class="password-section">
            <h3>Ganti Kata Sandi</h3>
            <div class="form-group">
                <label for="password">Kata Sandi Baru</label>
                <input type="password" id="password" placeholder="Kata sandi baru (opsional)">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Konfirmasi Kata Sandi</label>
                <input type="password" id="confirmPassword" placeholder="Konfirmasi kata sandi">
            </div>
        </div>

        <button id="saveProfile">Simpan Perubahan</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabase = Supabase.createClient(
        'https://uqnfychfsloouxjthokp.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbmZ5Y2hmc2xvb3V4anRob2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDQzNTMsImV4cCI6MjA4NzAyMDM1M30.2xLagrKBdnFX5X7TxsTUE-5ZRBZ2SO7dewA16R078Zc'
    );

    const messageEl = document.getElementById('message');
    let currentUser = null;
    let currentProfile = null;
    let autoSaveTimeout = null;

    function showMessage(text, isSuccess = false) {
        messageEl.textContent = text;
        messageEl.style.background = isSuccess ? 'var(--success-bg)' : 'var(--error-bg)';
        messageEl.classList.add('show');
        setTimeout(() => messageEl.classList.remove('show'), 5000);
    }

    function showLoading(show = true) {
        document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
    }

    async function loadUserProfile() {
        showLoading(true);
        try {
            const { data: { user }, error: authErr } = await supabase.auth.getUser();
            if (authErr || !user) {
                showMessage('Sesi berakhir. Silakan login kembali.');
                setTimeout(() => window.location.href = '/login.html', 2000);
                return;
            }

            currentUser = user;
            console.log('[DEBUG] User Auth:', { id: user.id, email: user.email });

            let { data: profile, error: profileErr } = await supabase
                .from('operator_profiles')
                .select('username, profile_pic, email, id_pegawai')
                .eq('user_id', user.id)
                .maybeSingle();

            if (profileErr) {
                console.error('[DEBUG] Profile fetch error:', profileErr);
                throw profileErr;
            }

            if (!profile) {
                console.log('[DEBUG] Profil belum ada → membuat baru...');
                const { error: insertErr } = await supabase
                    .from('operator_profiles')
                    .insert({
                        user_id: user.id,
                        email: user.email || '',
                        username: user.email ? user.email.split('@')[0] : 'user_' + user.id.slice(0,8),
                        profile_pic: '/assets/user.JPG',
                        id_pegawai: ''
                    });

                if (insertErr) {
                    console.error('[DEBUG] Insert error:', insertErr);
                    throw insertErr;
                }

                console.log('[DEBUG] Insert berhasil → reload profil');
                ({ data: profile } = await supabase
                    .from('operator_profiles')
                    .select('username, profile_pic, email, id_pegawai')
                    .eq('user_id', user.id)
                    .single());
            }

            if (!profile) throw new Error('Gagal memuat profil setelah insert');

            currentProfile = profile;
            console.log('[DEBUG] Profil berhasil dimuat:', currentProfile);

            // Update UI
            document.getElementById('previewPic').src = profile.profile_pic || '/assets/user.JPG';
            document.getElementById('sidebarProfilePic').src = profile.profile_pic || '/assets/user.JPG';
            document.getElementById('username').value = profile.username || '';
            document.getElementById('idPegawai').value = profile.id_pegawai || '';
            document.getElementById('email').value = profile.email || user.email || '';
            document.getElementById('sidebarUserName').textContent = profile.username || user.email.split('@')[0];

        } catch (err) {
            console.error('[DEBUG] Load profile gagal:', err.message, err);
            showMessage('Gagal memuat profil: ' + (err.message || 'Cek console browser'));
        } finally {
            showLoading(false);
        }
    }

    async function updateProfile(field, value) {
        if (!currentUser || !currentProfile) {
            console.warn('[DEBUG] Tidak bisa update: user atau profile belum ada');
            return;
        }

        try {
            console.log(`[DEBUG] Update ${field} menjadi: ${value}`);
            const { error } = await supabase
                .from('operator_profiles')
                .update({ [field]: value })
                .eq('user_id', currentUser.id);

            if (error) {
                console.error(`[DEBUG] Update ${field} gagal:`, error);
                throw error;
            }

            currentProfile[field] = value;
            if (field === 'username') {
                document.getElementById('sidebarUserName').textContent = value;
            }
            showMessage(`${field} berhasil diperbarui!`, true);
            console.log(`[DEBUG] Update ${field} berhasil`);
        } catch (err) {
            console.error(`[DEBUG] Gagal update ${field}:`, err.message, err);
            showMessage('Gagal update ' + field + ': ' + (err.message || 'Cek console'));
        }
    }

    async function uploadProfilePicture(file) {
        if (!file || !currentUser) return;

        try {
            showLoading(true);
            const fileExt = file.name.split('.').pop() || 'jpg';
            const fileName = `${currentUser.id}.${fileExt}`;
            const filePath = `profiles/${fileName}`;

            console.log('[DEBUG] Upload foto ke path:', filePath);

            const { error: uploadError } = await supabase.storage
                .from('profiles')
                .upload(filePath, file, { upsert: true });

            if (uploadError) {
                console.error('[DEBUG] Upload storage error:', uploadError);
                throw uploadError;
            }

            const { data: { publicUrl } } = supabase.storage
                .from('profiles')
                .getPublicUrl(filePath);

            console.log('[DEBUG] Public URL foto:', publicUrl);

            await updateProfile('profile_pic', publicUrl);

            document.getElementById('previewPic').src = publicUrl;
            document.getElementById('sidebarProfilePic').src = publicUrl;

        } catch (err) {
            console.error('[DEBUG] Upload foto gagal:', err.message, err);
            showMessage('Gagal upload foto: ' + (err.message || 'Cek console'));
        } finally {
            showLoading(false);
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await loadUserProfile();

        const toolbar = document.getElementById('toolbar');
        const mainContent = document.getElementById('mainContent');

        document.getElementById('toggleToolbar').addEventListener('click', () => {
            toolbar.classList.toggle('active');
            mainContent.classList.toggle('with-toolbar');
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            showMessage('Berhasil logout!', true);
            setTimeout(() => window.location.href = '/login.html', 1200);
        });

        document.getElementById('changePhotoBtn').addEventListener('click', () => {
            document.getElementById('profilePicture').click();
        });

        document.getElementById('profilePicture').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) uploadProfilePicture(file);
        });

        document.getElementById('username').addEventListener('input', (e) => {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(async () => {
                const val = e.target.value.trim();
                if (val.length < 3 || val === currentProfile?.username) return;
                await updateProfile('username', val);
            }, 1200);
        });

        document.getElementById('idPegawai').addEventListener('input', (e) => {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(async () => {
                const val = e.target.value.trim();
                if (val === currentProfile?.id_pegawai) return;
                await updateProfile('id_pegawai', val);
            }, 1200);
        });

        document.getElementById('saveProfile').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const idPegawai = document.getElementById('idPegawai').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!username || !idPegawai || !email) {
                showMessage('Username, ID Pegawai, dan Email wajib diisi!');
                return;
            }

            showLoading(true);
            try {
                await updateProfile('username', username);
                await updateProfile('id_pegawai', idPegawai);

                // Update email jika berubah
                if (email !== currentProfile.email) {
                    console.log('[DEBUG] Update email ke:', email);
                    const { error: authEmailErr } = await supabase.auth.updateUser({ email });
                    if (authEmailErr) throw authEmailErr;
                    await updateProfile('email', email);
                }

                // Update password jika diisi
                if (pass) {
                    if (pass.length < 6) throw new Error('Password minimal 6 karakter');
                    if (pass !== confirm) throw new Error('Konfirmasi password tidak cocok');

                    console.log('[DEBUG] Update password...');
                    const { error: authPassErr } = await supabase.auth.updateUser({ password: pass });
                    if (authPassErr) throw authPassErr;

                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                }

                showMessage('Semua perubahan berhasil disimpan!', true);
                console.log('[DEBUG] Save all berhasil');
            } catch (err) {
                console.error('[DEBUG] Save error:', err.message, err);
                showMessage('Gagal menyimpan: ' + (err.message || 'Cek console browser'));
            } finally {
                showLoading(false);
            }
        });
    });
</script>
</body>
</html>
