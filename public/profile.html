<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Parking | Profile Operator</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/Defdava/Digital-Twin-Website-used/blob/575171d0e9964327d99950733c2b48cea0c59d72/logo-brin.png?raw=true">

    <style>
        :root {
            --primary-blue: #1D3354;
            --accent-red: #D64045;
            --accent-red-hover: #c0392b;
            --text-light: #f0f4f8;
            --bg-overlay: rgba(29, 51, 84, 0.88);
            --input-bg: rgba(255,255,255,0.12);
            --error-bg: rgba(214,64,69,0.92);
            --success-bg: rgba(46, 204, 113, 0.92);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #d3d3d3;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            animation: slideshow 32s infinite ease-in-out;
            opacity: 0.35;
        }

        @keyframes slideshow {
            0%, 20%   { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); }
            20%, 40%  { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); }
            40%, 60%  { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); }
            60%, 80%  { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); }
            80%, 100% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); }
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo img { height: 48px; width: auto; }

        .logo-text { font-size: 1.35rem; font-weight: 700; }

        .logo-subtext { font-size: 0.9rem; opacity: 0.9; font-weight: 400; }

        .header-right { font-size: 1.1rem; font-weight: 500; }

        .toolbar {
            position: fixed;
            top: 60px;
            left: -280px;
            width: 280px;
            height: calc(100vh - 60px);
            background: var(--bg-overlay);
            backdrop-filter: blur(6px);
            padding: 20px;
            z-index: 900;
            overflow-y: auto;
            transition: left 0.3s ease;
            box-shadow: 4px 0 15px rgba(0,0,0,0.4);
            color: white;
        }

        .toolbar.active { left: 0; }

        .feature-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--accent-red);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .feature-box h3 { margin: 0 0 12px; font-size: 1.1rem; text-align: center; }

        .user-info { text-align: center; }

        .user-info img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--accent-red);
            margin-bottom: 10px;
        }

        .user-info span { display: block; margin: 4px 0; font-size: 0.95rem; }

        .toolbar button {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toolbar button:hover { background: var(--accent-red-hover); }

        .main-content {
            padding: 90px 20px 40px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .main-content.with-toolbar { margin-left: 280px; }

        .profile-card {
            background: var(--bg-overlay);
            backdrop-filter: blur(6px);
            padding: 2rem;
            border-radius: 16px;
            max-width: 420px;
            margin: 0 auto;
            border: 1.5px solid var(--accent-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
        }

        .profile-card h2 { margin: 0 0 1.5rem; font-size: 1.6rem; }

        .profile-pic-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .profile-pic-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-red);
            object-fit: cover;
            transition: transform 0.2s;
        }

        .profile-pic-container img:hover { transform: scale(1.05); }

        .change-photo-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-red);
            color: white;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .change-photo-btn:hover { background: var(--accent-red-hover); }

        .form-group {
            margin-bottom: 1.3rem;
            text-align: left;
        }

        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.95rem; }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--accent-red);
            border-radius: 8px;
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input::placeholder { color: rgba(255,255,255,0.6); }

        input:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(215,64,69,0.25);
        }

        .password-section {
            margin: 1.5rem 0;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
        }

        .password-section h3 { margin: 0 0 1rem; font-size: 1.1rem; }

        button#saveProfile {
            width: 100%;
            padding: 14px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button#saveProfile:hover { background: var(--accent-red-hover); transform: translateY(-1px); }

        button#saveProfile:disabled { background: #777; cursor: not-allowed; }

        .loading-spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #message {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 90%;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.4s, transform 0.4s;
        }

        #message.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #cameraOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
        }

        #cameraPopup {
            width: 90%;
            max-width: 360px;
            background: var(--bg-overlay);
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid var(--accent-red);
            text-align: center;
        }

        #cameraStream { width: 100%; border-radius: 10px; background: #000; margin: 1rem 0; }

        #cameraPopup button {
            padding: 10px 16px;
            margin: 8px 6px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        #captureBtn { background: var(--accent-red); color: white; }

        #closeCameraBtn { background: #555; color: white; }

        @media (max-width: 768px) {
            .toolbar { width: 80%; left: -80%; top: 56px; }
            .main-content.with-toolbar { margin-left: 0; }
            .profile-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" id="toggleToolbar">
        <img src="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/46a20c237c763bc2ccd436c332785427771eea05/public/brin_logo.png?raw=true" alt="BRIN Logo">
        <div>
            <div class="logo-text">BRIN</div>
            <div class="logo-subtext">Badan Riset dan Inovasi Nasional</div>
        </div>
    </div>
    <div class="header-right">Parking Management System – Profile</div>
</header>

<aside class="toolbar" id="toolbar">
    <div class="feature-box user-info">
        <h3>User Info</h3>
        <img id="sidebarProfilePic" src="/assets/user.JPG" alt="Profile">
        <span id="sidebarWelcome">Selamat Datang</span>
        <span id="sidebarUserName"></span>
        <button onclick="window.location.href='/profile.html'">Profile</button>
        <button id="logoutBtn">Keluar</button>
    </div>
    <div class="feature-box">
        <h3>Navigasi</h3>
        <button onclick="window.location.href='/index.html'">Live Overview</button>
        <button onclick="window.location.href='/previous-analysis.html'">Previous Analysis</button>
        <button onclick="window.location.href='/exportdata.html'">Export Data</button>
        <button onclick="window.location.href='/helpdesk.html'">Helpdesk</button>
        <button onclick="window.location.href='/parkiranalysis.html'">Parking Analysis</button>
    </div>
</aside>

<div class="main-content" id="mainContent">
    <div id="message"></div>

    <div class="profile-card">
        <h2>Pengaturan Profil</h2>

        <div class="profile-pic-container">
            <img id="previewPic" src="/assets/user.JPG" alt="Foto Profil">
            <button class="change-photo-btn" id="changePhotoBtn">📷</button>
            <input type="file" id="profilePicture" accept="image/*" style="display:none;">
        </div>

        <div class="loading-spinner" id="loadingSpinner"></div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Nama pengguna">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Alamat email">
        </div>

        <div class="password-section">
            <h3>Ganti Kata Sandi</h3>
            <div class="form-group">
                <label for="password">Kata Sandi Baru</label>
                <input type="password" id="password" placeholder="Kata sandi baru (opsional)">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Konfirmasi Kata Sandi</label>
                <input type="password" id="confirmPassword" placeholder="Konfirmasi kata sandi">
            </div>
        </div>

        <button id="saveProfile">Simpan Perubahan</button>
    </div>
</div>

<div id="cameraOverlay">
    <div id="cameraPopup">
        <h3>Kamera</h3>
        <video id="cameraStream" autoplay playsinline></video>
        <canvas id="cameraCanvas" style="display:none;"></canvas>
        <button id="captureBtn">Ambil Foto</button>
        <button id="closeCameraBtn">Tutup</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // HANYA SATU DEKLARASI supabase
    const { createClient } = window.supabase;

    const supabase = createClient(
        "https://uqnfychfsloouxjthokp.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbmZ5Y2hmc2xvb3V4anRob2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDQzNTMsImV4cCI6MjA4NzAyMDM1M30.2xLagrKBdnFX5X7TxsTUE-5ZRBZ2SO7dewA16R078Zc"
    );

    const messageEl = document.getElementById("message");
    let currentUser = null;
    let currentProfile = null;
    let mediaStream = null;
    let autoSaveTimeout = null;

    function showMessage(text, isSuccess = false) {
        messageEl.textContent = text;
        messageEl.style.background = isSuccess ? "var(--success-bg)" : "var(--error-bg)";
        messageEl.classList.add("show");
        setTimeout(() => messageEl.classList.remove("show"), 4500);
    }

    function showLoading(show = true) {
        document.getElementById("loadingSpinner").style.display = show ? "block" : "none";
    }

    async function loadUserProfile() {
        showLoading(true);
        try {
            const { data: { user }, error: authErr } = await supabase.auth.getUser();
            if (authErr || !user) {
                showMessage("Sesi berakhir. Silakan login kembali.");
                setTimeout(() => window.location.href = "/login.html", 2000);
                return;
            }

            currentUser = user;

            const { data: profile, error: profileErr } = await supabase
                .from("profiles")
                .select("username, profile_pic, email, id_pegawai")
                .eq("id", user.id)
                .single();

            if (profileErr || !profile) {
                throw new Error("Profil tidak ditemukan");
            }

            currentProfile = profile;

            // Update UI
            document.getElementById("previewPic").src = profile.profile_pic || "/assets/user.JPG";
            document.getElementById("sidebarProfilePic").src = profile.profile_pic || "/assets/user.JPG";
            document.getElementById("username").value = profile.username || "";
            document.getElementById("email").value = profile.email || user.email || "";
            document.getElementById("sidebarUserName").textContent = profile.username || user.email.split('@')[0];

        } catch (err) {
            showMessage(err.message || "Gagal memuat profil");
            console.error("Load profile error:", err);
        } finally {
            showLoading(false);
        }
    }

    async function updateProfile(field, value) {
        if (!currentProfile) return;

        try {
            const updateData = { [field]: value };
            const { error } = await supabase
                .from("profiles")
                .update(updateData)
                .eq("id", currentUser.id);

            if (error) throw error;

            currentProfile[field] = value;
            if (field === "username") {
                document.getElementById("sidebarUserName").textContent = value;
            }
            showMessage(`${field.charAt(0).toUpperCase() + field.slice(1)} diperbarui!`, true);
        } catch (err) {
            showMessage("Gagal menyimpan: " + (err.message || "Unknown error"));
            console.error("Update profile error:", err);
        }
    }

    async function updateAuth(data) {
        try {
            const { error } = await supabase.auth.updateUser(data);
            if (error) throw error;
            showMessage("Perubahan autentikasi berhasil! (Email mungkin perlu konfirmasi)", true);
        } catch (err) {
            showMessage("Gagal update autentikasi: " + (err.message || "Unknown error"));
            console.error("Update auth error:", err);
            throw err;
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        await loadUserProfile();

        const toolbar = document.getElementById("toolbar");
        const mainContent = document.getElementById("mainContent");

        // Toggle sidebar
        document.getElementById("toggleToolbar").addEventListener("click", () => {
            toolbar.classList.toggle("active");
            mainContent.classList.toggle("with-toolbar");
        });

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await supabase.auth.signOut();
            showMessage("Berhasil logout!", true);
            setTimeout(() => window.location.href = "/login.html", 1200);
        });

        // Buka kamera
        document.getElementById("changePhotoBtn").addEventListener("click", async () => {
            try {
                document.getElementById("cameraOverlay").style.display = "flex";
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById("cameraStream").srcObject = mediaStream;
            } catch (err) {
                showMessage("Tidak bisa akses kamera: " + err.message);
            }
        });

        // Capture foto dari kamera
        document.getElementById("captureBtn").addEventListener("click", () => {
            const video = document.getElementById("cameraStream");
            const canvas = document.getElementById("cameraCanvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);

            const base64 = canvas.toDataURL("image/png");
            document.getElementById("previewPic").src = base64;
            document.getElementById("sidebarProfilePic").src = base64;

            updateProfile("profile_pic", base64);

            // Tutup kamera
            document.getElementById("cameraOverlay").style.display = "none";
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
        });

        // Tutup kamera manual
        document.getElementById("closeCameraBtn").addEventListener("click", () => {
            document.getElementById("cameraOverlay").style.display = "none";
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
        });

        // Auto-save username
        document.getElementById("username").addEventListener("input", (e) => {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(async () => {
                const val = e.target.value.trim();
                if (val.length < 3 || val === currentProfile.username) return;
                await updateProfile("username", val);
            }, 1200);
        });

        // Auto-save email
        document.getElementById("email").addEventListener("blur", async (e) => {
            const newEmail = e.target.value.trim();
            if (!newEmail || newEmail === currentProfile.email) return;

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)) {
                showMessage("Format email salah!");
                e.target.value = currentProfile.email;
                return;
            }

            showLoading(true);
            try {
                await updateAuth({ email: newEmail });
                await updateProfile("email", newEmail);
            } catch {}
            showLoading(false);
        });

        // Save all changes (termasuk password)
        document.getElementById("saveProfile").addEventListener("click", async () => {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const pass = document.getElementById("password").value;
            const confirmPass = document.getElementById("confirmPassword").value;

            if (!username || !email) {
                showMessage("Username & email wajib diisi!");
                return;
            }

            showLoading(true);
            try {
                await updateProfile("username", username);
                if (email !== currentProfile.email) {
                    await updateAuth({ email });
                    await updateProfile("email", email);
                }

                if (pass) {
                    if (pass.length < 6) throw new Error("Password minimal 6 karakter");
                    if (pass !== confirmPass) throw new Error("Konfirmasi password tidak cocok");
                    await updateAuth({ password: pass });
                    document.getElementById("password").value = "";
                    document.getElementById("confirmPassword").value = "";
                }

                showMessage("Semua perubahan disimpan!", true);
            } catch (err) {
                showMessage(err.message || "Gagal menyimpan");
            } finally {
                showLoading(false);
            }
        });
    });
</script>
</body>
</html>
