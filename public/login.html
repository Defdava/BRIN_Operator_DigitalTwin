<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Login</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/Defdava/Digital-Twin-Website-used/blob/575171d0e9964327d99950733c2b48cea0c59d72/logo-brin.png?raw=true">
    <style>
        :root {
            --primary-blue: #1D3354;
            --accent-red: #D64045;
            --text-color: #FFFFFF;
            --white-bg: #E9FFF9;
            --slot-empty: #9ED8DB;
            --slot-occupied: #467599;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            overflow-x: hidden;
            font-size: 16px;
            touch-action: manipulation;
            background: #d3d3d3;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -2;
            animation: slideshow 20s infinite;
            opacity: 0.4;
        }

        @keyframes slideshow {
            0% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.4; }
            15% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.4; }
            20% { opacity: 0; }

            20.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0; }
            35% { opacity: 0.4; }
            40% { opacity: 0; }

            40.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0; }
            55% { opacity: 0.4; }
            60% { opacity: 0; }

            60.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0; }
            75% { opacity: 0.4; }
            80% { opacity: 0; }

            80.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0; }
            95% { opacity: 0.4; }
            100% { opacity: 0; }
        }

        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .logo img { height: 50px; }

        .logo span {
            margin-left: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .header-right span {
            font-size: 18px;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 90px;
            padding-bottom: 50px;
        }

        .welcome-message {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            width: 300px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .login-box {
            background-color: rgba(29,51,84,0.9);
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            border: 2px solid var(--accent-red);
        }

        .login-box h2 {
            margin: 0 0 20px;
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            background-color: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-red);
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        #error-message {
            position: fixed;
            top: 90px;
            right: 30px;
            background: rgba(214,64,69,0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

    </style>
</head>
<body>
<header>
    <div class="logo">
        <img src="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/46a20c237c763bc2ccd436c332785427771eea05/public/brin_logo.png?raw=true">
        <span>BRIN</span>
        <span>Badan Riset dan Inovasi Nasional</span>
    </div>

    <div class="header-right">
        <span>Parking Management System</span>
    </div>
</header>

<div class="login-container">
    <div class="welcome-message">Welcome to BRIN Parking (Operator)</div>

    <div class="login-box">
        <h2>LOGIN</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Kata Sandi" required>
            <a href="/forgotpassword.html">Forgot Password? Click Here</a>
            <button type="submit">Login</button>
            <a href="/register.html">Don't Have Account? Register</a>
        </form>
    </div>

    <div id="error-message"></div>
</div>

<script>
/* ===============================
   OOP EXCEPTION HANDLING
================================ */
class AuthException extends Error {
    constructor(message, code) {
        super(message);
        this.name = "AuthException";
        this.code = code;
    }
}

class UserNotFoundException extends AuthException {
    constructor() { super("Email tidak terdaftar!", "USER_NOT_FOUND"); }
}

class WrongPasswordException extends AuthException {
    constructor() { super("Kata sandi salah!", "WRONG_PASSWORD"); }
}

class UserAlreadyExistsException extends AuthException {
    constructor() { super("Pengguna sudah terdaftar!", "USER_EXISTS"); }
}

/* ===============================
   USER CLASS
================================ */
class User {
    constructor(username, email, password, idWorker, profilePic = "/assets/user.JPG") {
        this.username = username;
        this.email = email;
        this.password = password;
        this.idWorker = idWorker;
        this.profilePic = profilePic;
    }
}

/* ===============================
   AUTH SYSTEM (OOP + EXCEPTIONS)
================================ */
class AuthSystem {
    constructor() {
        this.users = JSON.parse(localStorage.getItem('users')) || [];
    }

    register(username, email, password, idWorker, profilePic) {
        const exist = this.users.some(u => u.email === email);
        if (exist) throw new UserAlreadyExistsException();

        const newUser = new User(username, email, password, idWorker, profilePic);
        this.users.push(newUser);
        localStorage.setItem('users', JSON.stringify(this.users));
        return newUser;
    }

    login(email, password) {
        const user = this.users.find(u => u.email === email);
        if (!user) throw new UserNotFoundException();

        if (user.password !== password) throw new WrongPasswordException();

        return user;
    }
}

const auth = new AuthSystem();

/* ===============================
   ERROR DISPLAY FUNCTION
================================ */
function showError(message, isSuccess = false) {
    const errorEl = document.getElementById('error-message');
    errorEl.textContent = message;

    errorEl.style.background = isSuccess
        ? "rgba(0,200,0,0.9)"
        : "rgba(214,64,69,0.9)";

    errorEl.style.display = 'block';

    setTimeout(() => { errorEl.style.display = 'none'; }, 4000);
}

/* ===============================
   LOGIN EVENTS
================================ */
document.addEventListener("DOMContentLoaded", () => {

    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        try {
            const user = auth.login(email, password);

            showError("Login berhasil!", true);

            localStorage.setItem("currentUser", JSON.stringify(user));

            setTimeout(() => {
                window.location.replace("/index.html");
            }, 1500);

        } catch (err) {
            if (err instanceof AuthException) {
                showError(`[${err.code}] ${err.message}`);
            } else {
                showError("Terjadi kesalahan tidak dikenal!");
                console.error(err);
            }
        }
    });
});
</script>

</body>
</html>
