<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Parking | Masuk Operator</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo-brin.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D64045">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.error('Service Worker failed:', err));
        });
      }
    </script>

    <style>
        :root {
            --primary-blue: #1D3354;
            --accent-red: #D64045;
            --accent-red-hover: #c0392b;
            --text-light: #f0f4f8;
            --bg-overlay: rgba(29, 51, 84, 0.88);
            --input-bg: rgba(255,255,255,0.12);
            --error-bg: rgba(214,64,69,0.92);
            --success-bg: rgba(46, 204, 113, 0.92);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #d3d3d3;
            color: var(--text-light);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slideshow 32s infinite ease-in-out;
            opacity: 0.35;
        }

        @keyframes slideshow {
            0%, 20%   { background-image: url('/assets/fotobrin1.jpg'); }
            20%, 40%  { background-image: url('/assets/fotobrin3.jpg'); }
            40%, 60%  { background-image: url('/assets/fotobrin2.jpg'); }
            60%, 80%  { background-image: url('/assets/fotobrin4.jpg'); }
            80%, 100% { background-image: url('/assets/fotobrin.jpg'); }
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img { height: 48px; width: auto; }

        .logo-text { font-size: 1.35rem; font-weight: 700; }

        .logo-subtext { font-size: 0.9rem; opacity: 0.9; }

        .header-right { font-size: 1.1rem; font-weight: 500; }

        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 60px;
        }

        .welcome {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.8rem;
            color: white;
            text-shadow: 0 3px 10px rgba(0,0,0,0.5);
        }

        .login-card {
            background: var(--bg-overlay);
            backdrop-filter: blur(6px);
            padding: 2.2rem 1.8rem;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            border: 1.5px solid var(--accent-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .login-card h2 {
            margin: 0 0 1.8rem;
            text-align: center;
            color: white;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--accent-red);
            border-radius: 8px;
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
        }

        input::placeholder { color: rgba(255,255,255,0.6); }

        input:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(215,64,69,0.25);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { background: var(--accent-red-hover); }

        button:disabled { background: #777; cursor: not-allowed; }

        .links {
            margin-top: 1.4rem;
            text-align: center;
            font-size: 0.95rem;
        }

        .links a { color: #5dade2; text-decoration: none; }

        .links a:hover { color: #85c1e9; text-decoration: underline; }

        #message {
            position: fixed;
            top: 80px;
            right: 20px;
            left: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 14px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s;
        }

        #message.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="/assets/brin_logo.png" alt="BRIN Logo">
        <div>
            <div class="logo-text">BRIN</div>
            <div class="logo-subtext">Badan Riset dan Inovasi Nasional</div>
        </div>
    </div>
    <div class="header-right">Parking Management System – Operator</div>
</header>

<div class="login-page">
    <div class="welcome">Masuk Akun Operator BRIN Parking</div>

    <div class="login-card">
        <h2>LOGIN</h2>
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Email" required autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Kata Sandi" required autocomplete="current-password">
            </div>
            <button type="submit" id="btnLogin">Masuk</button>
        </form>

        <div class="links">
            <a href="/register.html">Belum punya akun? Daftar</a>
        </div>
    </div>
</div>

<div id="message"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const supabase = window.supabase.createClient(
        "https://uqnfychfsloouxjthokp.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbmZ5Y2hmc2xvb3V4anRob2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDQzNTMsImV4cCI6MjA4NzAyMDM1M30.2xLagrKBdnFX5X7TxsTUE-5ZRBZ2SO7dewA16R078Zc"
    );

    const messageEl = document.getElementById("message");
    const btnLogin  = document.getElementById("btnLogin");
    const form      = document.getElementById("loginForm");

    if (!form || !btnLogin || !messageEl) {
        console.error("Elemen form/login tidak ditemukan");
        return;
    }

    function showMessage(text, isSuccess = false) {
        messageEl.textContent = text;
        messageEl.style.background = isSuccess ? "var(--success-bg)" : "var(--error-bg)";
        messageEl.classList.add("show");
        setTimeout(() => messageEl.classList.remove("show"), 6000);
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const emailEl    = document.getElementById("loginEmail");
        const passwordEl = document.getElementById("loginPassword");

        if (!emailEl || !passwordEl) {
            showMessage("Kesalahan sistem: input tidak ditemukan");
            return;
        }

        const email    = emailEl.value.trim();
        const password = passwordEl.value.trim();

        if (!email || !password) {
            showMessage("Email dan kata sandi wajib diisi");
            return;
        }

        btnLogin.disabled = true;
        btnLogin.textContent = "Memproses...";

        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) throw error;
            if (!data?.user) throw new Error("Login gagal");

            localStorage.setItem('currentUser', JSON.stringify({
                id: data.user.id,
                username: data.user.user_metadata?.username || '',
                email: data.user.email,
                id_pegawai: data.user.user_metadata?.id_pegawai || '',
                profilePic: data.user.user_metadata?.profilePic || '/assets/user.JPG'
            }));

            showMessage("Login berhasil! Mengarahkan ke dashboard...", true);
            setTimeout(() => window.location.href = "/index.html", 1500);

        } catch (err) {
            showMessage("Gagal login: " + (err.message || "Unknown error"));
        } finally {
            btnLogin.disabled = false;
            btnLogin.textContent = "Masuk";
        }
    });
});
</script>
</body>
</html>
