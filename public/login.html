<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Parking | Operator Login</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/Defdava/Digital-Twin-Website-used/blob/575171d0e9964327d99950733c2b48cea0c59d72/logo-brin.png?raw=true">

    <style>
        /* Gunakan style login lengkap dari versi sebelumnya */
        :root {
            --primary-blue: #1D3354;
            --accent-red: #D64045;
            --accent-red-hover: #c0392b;
            --text-light: #f0f4f8;
            --bg-overlay: rgba(29, 51, 84, 0.88);
            --input-bg: rgba(255,255,255,0.12);
            --error-bg: rgba(214,64,69,0.92);
            --success-bg: rgba(46, 204, 113, 0.92);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #d3d3d3;
            color: var(--text-light);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slideshow 32s infinite ease-in-out;
            opacity: 0.35;
        }

        @keyframes slideshow {
            0%, 20%   { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); }
            20%, 40%  { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); }
            40%, 60%  { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); }
            60%, 80%  { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); }
            80%, 100% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); }
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img { height: 48px; width: auto; }

        .logo-text { font-size: 1.35rem; font-weight: 700; }

        .logo-subtext { font-size: 0.9rem; opacity: 0.9; }

        .header-right { font-size: 1.1rem; font-weight: 500; }

        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 60px;
        }

        .welcome {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.8rem;
            color: white;
            text-shadow: 0 3px 10px rgba(0,0,0,0.5);
        }

        .login-card {
            background: var(--bg-overlay);
            backdrop-filter: blur(6px);
            padding: 2.2rem 1.8rem;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            border: 1.5px solid var(--accent-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .login-card h2 {
            margin: 0 0 1.8rem;
            text-align: center;
            color: white;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--accent-red);
            border-radius: 8px;
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
        }

        input::placeholder { color: rgba(255,255,255,0.6); }

        input:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(215,64,69,0.25);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { background: var(--accent-red-hover); }

        button:disabled { background: #777; cursor: not-allowed; }

        .links {
            margin-top: 1.4rem;
            text-align: center;
            font-size: 0.95rem;
        }

        .links a { color: #5dade2; text-decoration: none; }

        .links a:hover { color: #85c1e9; text-decoration: underline; }

        #message {
            position: fixed;
            top: 80px;
            right: 20px;
            left: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 14px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s;
        }

        #message.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/46a20c237c763bc2ccd436c332785427771eea05/public/brin_logo.png?raw=true" alt="BRIN Logo">
        <div>
            <div class="logo-text">BRIN</div>
            <div class="logo-subtext">Badan Riset dan Inovasi Nasional</div>
        </div>
    </div>
    <div class="header-right">Parking Management System – Operator</div>
</header>

<div class="login-page">
    <div class="welcome">Welcome to BRIN Parking (Operator)</div>

    <div class="login-card">
        <h2>LOGIN</h2>
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="loginUsername" placeholder="Username" required autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Kata Sandi" required autocomplete="current-password">
            </div>
            <button type="submit" id="btnLogin">Masuk</button>
        </form>

        <div class="links">
            <a href="/register.html">Belum punya akun? Daftar</a>
        </div>
    </div>
</div>

<div id="message"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const { createClient } = window.supabase;

    const supabase = createClient(
        "https://uqnfychfsloouxjthokp.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbmZ5Y2hmc2xvb3V4anRob2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDQzNTMsImV4cCI6MjA4NzAyMDM1M30.2xLagrKBdnFX5X7TxsTUE-5ZRBZ2SO7dewA16R078Zc"
    );

    const messageEl = document.getElementById("message");
    const btnLogin = document.getElementById("btnLogin");

    function showMessage(text, isSuccess = false) {
        messageEl.textContent = text;
        messageEl.style.background = isSuccess ? "var(--success-bg)" : "var(--error-bg)";
        messageEl.classList.add("show");
        setTimeout(() => messageEl.classList.remove("show"), 4500);
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;

        if (!username || !password) {
            showMessage("Username dan kata sandi harus diisi");
            return;
        }

        btnLogin.disabled = true;
        btnLogin.textContent = "Memproses...";

        try {
            const { data: profile, error: profileErr } = await supabase
                .from("profiles")
                .select("email")
                .eq("username", username)
                .maybeSingle();

            if (profileErr) throw profileErr;
            if (!profile?.email) throw new Error("Username tidak ditemukan");

            const { error: authErr } = await supabase.auth.signInWithPassword({
                email: profile.email,
                password
            });

            if (authErr) throw authErr;

            showMessage("Login berhasil! Mengarahkan ke dashboard...", true);
            setTimeout(() => window.location.href = "/index.html", 1500);
        } catch (err) {
            console.error("Login error:", err);
            showMessage(err.message || "Gagal login. Periksa username/kata sandi.");
        } finally {
            btnLogin.disabled = false;
            btnLogin.textContent = "Masuk";
        }
    });
</script>
</body>
</html>
